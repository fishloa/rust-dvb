name: Release

# Publishes the workspace crates to crates.io when a version tag is pushed.
# CI is the only source of published artifacts — never `cargo publish` from a
# workstation. Requires the CARGO_REGISTRY_TOKEN repository secret (a
# crates.io API token with publish-new + publish-update scope).

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Gate — full test suite
        run: cargo test --workspace --all-features --locked

      - name: Gate — clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

      - name: Gate — tag matches crate versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for c in dvb-common dvb-si dvb-t2mi dvb-bbframe; do
            V=$(cargo metadata --no-deps --format-version 1 --locked \
                | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['$c'])")
            if [ "$V" != "$TAG" ]; then
              echo "::error::$c is $V but tag is $TAG"; exit 1
            fi
          done

      # Dependency order: dvb-common first, then the three dependents.
      # The index can lag a few seconds after a publish; `cargo publish`
      # blocks until the published crate is available since Cargo 1.66, so
      # no manual sleep is needed.
      - name: Publish dvb-common
        run: cargo publish -p dvb-common --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish dvb-si
        run: cargo publish -p dvb-si --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish dvb-t2mi
        run: cargo publish -p dvb-t2mi --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish dvb-bbframe
        run: cargo publish -p dvb-bbframe --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
