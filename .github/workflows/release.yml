name: Release

# Publishes the workspace crates to crates.io when a version tag is pushed.
# CI is the only source of published artifacts — never `cargo publish` from a
# workstation. Requires the CARGO_REGISTRY_TOKEN repository secret (a
# crates.io API token with publish-new + publish-update scope).

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Gate — full test suite
        run: cargo test --workspace --all-features --locked

      - name: Gate — clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

      - name: Gate — tag matches crate versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for c in dvb-common dvb-si dvb-t2mi dvb-bbframe dvb-tools; do
            V=$(cargo metadata --no-deps --format-version 1 --locked \
                | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['$c'])")
            if [ "$V" != "$TAG" ]; then
              echo "::error::$c is $V but tag is $TAG"; exit 1
            fi
          done

      # Dependency order (topological): dvb-common has no workspace deps and
      # must go first. dvb-si and dvb-bbframe each depend only on dvb-common.
      # dvb-t2mi depends on dvb-common AND (optionally, ts-gated) dvb-bbframe,
      # so it must publish after dvb-bbframe is on the index.
      # dvb-tools depends on both dvb-si (ts + serde + chrono) and dvb-t2mi (ts),
      # so it publishes LAST. Hence:
      #   common → bbframe → si → t2mi → tools.
      # The index can lag a few seconds after a publish; `cargo publish` blocks
      # until the published crate is available since Cargo 1.66, so no manual
      # sleep is needed.
      #
      # Each step is idempotent: `publish_crate` treats an "already uploaded"
      # / "crate version already exists" error as success, so re-running the
      # workflow after a partial publish skips the crates that already shipped
      # and only publishes the missing ones.
      - name: Publish crates
        run: |
          publish_crate() {
            local crate="$1"
            local out
            if out=$(cargo publish -p "$crate" --locked 2>&1); then
              echo "$out"
              echo "::notice::published $crate"
              return 0
            fi
            echo "$out"
            if echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
              echo "::notice::$crate already on crates.io at this version — skipping"
              return 0
            fi
            echo "::error::failed to publish $crate"
            return 1
          }
          publish_crate dvb-common
          publish_crate dvb-bbframe
          publish_crate dvb-si
          publish_crate dvb-t2mi
          publish_crate dvb-tools
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
