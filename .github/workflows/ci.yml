name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.75"] # 1.75 == workspace rust-version (MSRV)
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      # --locked: the committed Cargo.lock pins MSRV-compatible dependency
      # versions (some newer transitive crates require edition2024 / Cargo 1.85).
      - name: Build (all features)
        run: cargo build --workspace --all-features --locked
      - name: Test (all features)
        run: cargo test --workspace --all-features --locked
      - name: Build (no default features)
        run: cargo build --workspace --no-default-features --locked
      - name: Test (no default features)
        run: cargo test --workspace --no-default-features --locked

  lint:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Deliberate column alignment (TableId / DescriptorTag discriminants)
      # is protected by #[rustfmt::skip]; everything else is rustfmt-clean.
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  docs:
    name: doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Docs are warning-clean: bit-range notation is backticked (`[7:4]`)
      # so it can't be mistaken for intra-doc links. Keep it that way.
      - name: cargo doc
        run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"
